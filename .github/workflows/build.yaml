# This is a basic workflow to help you get started with Actions

name: "Build and test"

# Controls when the action will run. Triggers the workflow on push
# events but only for the master branch
on:
  push:
    # only trigger on branches, not on tags
    branches: '**'
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:
    inputs:
      UseSpecialSettings:
        description: 'Use special settings: not available in forks'
        required: false
        default: false
        type: boolean
      UseLastRepositoryBuildJNet:
        description: 'Use latest NuGet packages from JNet'
        required: false
        default: false
        type: boolean
      UseLastRepositoryBuildKNet:
        description: 'Use latest NuGet packages from KNet'
        required: false
        default: false
        type: boolean
      UseKNetCompactedReplicator:
        description: 'Use KNetCompactedReplicator as storage backend'
        required: false
        default: false
        type: boolean
      ForceContinueOnError:
        description: 'Force continue-on-error'
        required: false
        default: false
        type: boolean
      UploadServerLogs:
        description: 'Upload server logs'
        required: false
        default: false
        type: boolean
      EnableProcessDump:
        description: 'Enable .NET process dump'
        required: false
        default: '0'
        type: choice
        options:
          - "0"
          - "1"
      ProcessDumpType:
        description: '.NET process dump type'
        required: false
        default: '3'
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
      EnableVerboseDiagnosticProcessDump:
        description: 'Enables verbose diagnostic logging of the dump process'
        required: false
        default: '0'
        type: choice
        options:
          - "0"
          - "1"

  schedule:
    - cron: "0 4 * * 6"

# This workflow contains two jobs called "check_changes", "build_windows"
jobs:
  # Verify if a build is needed
  check_changes:
    name: Check changed files
    outputs:
      run_build_windows: ${{ steps.check_files.outputs.run_build_windows || steps.force_execute.outputs.run_build_windows }}
    runs-on: ubuntu-latest
    steps:
      - name: Force check on true
        id: force_execute
        if: ${{ github.event_name != 'push' }}
        run: echo "run_build_windows=true" >> $GITHUB_OUTPUT
      - name: Create modified file list
        id: get_changed_files
        if: ${{ github.event_name == 'push' }}
        uses: masesgroup/retrieve-changed-files@v3
        with:
          format: 'csv'
      - name: Check modified file list
        id: check_files
        if: ${{ github.event_name == 'push' }}
        run: |
          mapfile -d ',' -t added_modified_files < <(printf '%s,' '${{ steps.get_changed_files.outputs.added_modified }}')
          for added_modified_file in "${added_modified_files[@]}"; do
              if [[ $added_modified_file == ".github/workflows/build.yaml"* ]]; then
                echo "$added_modified_file is myself."
                echo "run_build_windows=true" >> $GITHUB_OUTPUT
                break
              fi
              if [[ $added_modified_file == "src/net/"* ]]; then
                echo "$added_modified_file file is under the directory 'src/'."
                echo "run_build_windows=true" >> $GITHUB_OUTPUT
                break
              fi
              if [[ $added_modified_file == "test/"* ]]; then
                echo "$added_modified_file file is under the directory 'src/'."
                echo "run_build_windows=true" >> $GITHUB_OUTPUT
                break
              fi
          done
      - name: Get run_build_windows
        run: echo "The selected run_build_windows is ${{ steps.check_files.outputs.run_build_windows || steps.force_execute.outputs.run_build_windows }}"

  build:
    needs: check_changes
    if: "always() && needs.check_changes.outputs.run_build == 'true'"
    permissions:
      contents: read
      pull-requests: write
      attestations: write
      packages: write
      id-token: write
    uses: ./.github/workflows/build_common.yaml
    with:
      EnableLinuxTests: true
      UseSpecialSettings: ${{ inputs.UseSpecialSettings || false }}
      EnableWindowsTests: ${{ github.ref_name == 'master' || github.event_name == 'schedule' }}
      EnableMacOSTests: ${{ github.event_name == 'schedule' }}
      UseLastRepositoryBuildJNet: ${{ inputs.UseLastRepositoryBuildJNet || false }}
      UseLastRepositoryBuildKNet: ${{ inputs.UseLastRepositoryBuildKNet || false }}
      UseKNetCompactedReplicator: ${{ inputs.UseKNetCompactedReplicator || false }}
      ForceContinueOnError: ${{ inputs.ForceContinueOnError || false }}
      UploadServerLogs: ${{ inputs.ForceContinueOnError || false }}
      EnableProcessDump: ${{ inputs.EnableProcessDump || '0' }}
      ProcessDumpType: ${{ inputs.ProcessDumpType || '3' }}
      EnableVerboseDiagnosticProcessDump: ${{ inputs.EnableVerboseDiagnosticProcessDump || '0' }}
    secrets:
      actor: ${{ github.actor }}
      GITHUB_TOKEN_INHERITED: ${{ secrets.GITHUB_TOKEN }}
      JCOBRIDGE_ENCODED: ${{ secrets.JCOBRIDGE_ENCODED_2_6_6 }}
