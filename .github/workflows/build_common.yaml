# This is a basic workflow to help you get started with Actions

name: Common build workflow

# Controls when the action will run. Triggers the workflow on push
# events but only for the master branch
on:
  workflow_call:
    inputs:
      EnableDebugLogging:
        description: 'Enable debug logs in tests'
        required: false
        default: false
        type: boolean
      ExecuteOnMoreOSes:
        description: 'Executes tests on more Oses'
        required: false
        default: false
        type: boolean
      ExecuteOnLargerJDKSet:
        description: 'Executes tests on more JDK'
        required: false
        default: false
        type: boolean
      EnableLinuxTests:
        description: 'Enable tests in Linux'
        required: false
        default: false
        type: boolean
      EnableWindowsTests:
        description: 'Enable tests in Windows'
        required: false
        default: false
        type: boolean
      EnableMacOSTests:
        description: 'Enable tests in MacOS'
        required: false
        default: false
        type: boolean
      UseSpecialSettings:
        description: 'Use special settings: not available in forks'
        required: false
        default: false
        type: boolean
      UseLastRepositoryBuildJNet:
        description: 'Use latest NuGet packages from JNet'
        required: false
        default: false
        type: boolean
      UseLastRepositoryBuildKNet:
        description: 'Use latest NuGet packages from KNet'
        required: false
        default: false
        type: boolean
      UseKNetCompactedReplicator:
        description: 'Use KNetCompactedReplicator as storage backend'
        required: false
        default: false
        type: boolean
      ForceContinueOnError:
        description: 'Force continue-on-error'
        required: false
        default: false
        type: boolean
      UploadServerLogs:
        description: 'Upload server logs'
        required: false
        default: false
        type: boolean
      EnableProcessDump:
        description: 'Enable .NET process dump'
        required: false
        default: '0'
        type: string
      ProcessDumpType:
        description: '.NET process dump type'
        required: false
        default: '3'
        type: string
      EnableVerboseDiagnosticProcessDump:
        description: 'Enables verbose diagnostic logging of the dump process'
        required: false
        default: '0'
        type: string
    secrets:
      actor:
        required: true
      GITHUB_TOKEN_INHERITED:
        required: true
      JCOBRIDGE_ENCODED:
        required: true

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}'
  cancel-in-progress: true

# This workflow contains two jobs called "check_changes", "build_windows"
jobs:
  # Now run "build_windows"
  build_windows:
    # The type of runner that the job will run on
    runs-on: windows-2022

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:   
      # Runs a set of commands using the runners shell
      # Support longpaths
      - name: Support long paths
        run: git config --system core.longpaths true
    
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
        with:
          fetch-depth: '1'
          submodules: 'true'

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.x
            10.x

      - name: Get last workflow run of JNet
        if: ${{ inputs.UseLastRepositoryBuildJNet == true }}
        shell: bash
        run: echo "JNET_LAST_RUN=$(curl -sL https://api.github.com/repos/masesgroup/JNet/actions/workflows/build.yaml/runs | jq -r '.workflow_runs[0].id?')" >> $GITHUB_ENV

      - name: Download artifact
        if: ${{ inputs.UseLastRepositoryBuildJNet == true }}
        run: gh run download ${{ env.JNET_LAST_RUN }} --name JNetNuGet --repo masesgroup/JNet --dir JNetNuGet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN_INHERITED }}

      - name: List NuGet packages downloaded
        if: ${{ inputs.UseLastRepositoryBuildJNet == true }}
        shell: cmd
        run: dir .\JNetNuGet\*nupkg

      - name: Add local repo
        if: ${{ success() && inputs.UseLastRepositoryBuildJNet == true }}
        run: dotnet nuget add source --name localJNetNuGet "${{ github.workspace }}\JNetNuGet\"

      - name: Get last workflow run of KNet
        if: ${{ inputs.UseLastRepositoryBuildKNet == true }}
        shell: bash
        run: echo "KNET_LAST_RUN=$(curl -sL https://api.github.com/repos/masesgroup/KNet/actions/workflows/build.yaml/runs | jq -r '.workflow_runs[0].id?')" >> $GITHUB_ENV

      - name: Download KNetNuGet artifact
        if: ${{ inputs.UseLastRepositoryBuildKNet == true }}
        run: gh run download ${{ env.KNET_LAST_RUN }} --name KNetNuGet --repo masesgroup/KNet --dir KNetNuGet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN_INHERITED }}

      - name: List KNetNuGet packages downloaded
        if: ${{ inputs.UseLastRepositoryBuildKNet == true }}
        shell: cmd
        run: dir .\KNetNuGet\*nupkg

      - name: Add local repo
        if: ${{ success() && inputs.UseLastRepositoryBuildKNet == true }}
        run: dotnet nuget add source --name localKNetNuGet "${{ github.workspace }}\KNetNuGet\"

      - name: Save MASES.KNetCLI in cache
        if: ${{ inputs.UseLastRepositoryBuildKNet == true }}
        uses: actions/cache/save@v5
        with:
          enableCrossOsArchive: true
          path: ./KNetNuGet/MASES.KNetCLI*
          key: KEFCore_${{ github.run_number }}_${{ github.run_attempt }}_MASES.KNetCLI_${{ github.sha }}

      - name: Recompile to create nuget packages
        run: dotnet build --no-incremental --configuration Release /p:Platform="Any CPU" src\net\KEFCore.sln

      - name: List NuGet packages to avoid download of artifact
        shell: cmd
        run: dir .\bin\*nupkg

      - uses: actions/upload-artifact@v7
        with:
          name: KEFCoreNuGet
          path: .\bin\*nupkg

      - name: Compile tests
        run: dotnet build --no-incremental --configuration Release /p:Platform="Any CPU" test\KEFCore.Test.sln

      - name: Prepare configuration files
        run: |
          Copy-Item .github\workflows\configuration\* -Destination bin\net8.0\ -Force
          Copy-Item .github\workflows\configuration\* -Destination bin\net9.0\ -Force
          Copy-Item .github\workflows\configuration\* -Destination bin\net10.0\ -Force

      - name: Prepare other files
        if: ${{ inputs.UseSpecialSettings == true }}
        shell: cmd
        run: |
          7z e ${{ github.workspace }}\.github\workflows\configuration\source.zip -o"${{ github.workspace }}\bin\" -p${{ secrets.FIRST_SPECIAL_SETTINGS_PASSWORD }}
          7z x ${{ github.workspace }}\bin\source.info -o"${{ github.workspace }}\bin\" -p${{ secrets.SPECIAL_SETTINGS_PASSWORD }} -y

      - name: Save KEFCore net8.0 bin in cache
        uses: actions/cache/save@v5
        with:
          enableCrossOsArchive: true
          path: ./bin/net8.0/
          key: KEFCore_${{ github.run_number }}_${{ github.run_attempt }}_net8.0_bin_${{ github.sha }}
          
      - name: Save KEFCore net9.0 bin in cache
        uses: actions/cache/save@v5
        with:
          enableCrossOsArchive: true
          path: ./bin/net9.0/
          key: KEFCore_${{ github.run_number }}_${{ github.run_attempt }}_net9.0_bin_${{ github.sha }}

      - name: Save KEFCore net10.0 bin in cache
        uses: actions/cache/save@v5
        with:
          enableCrossOsArchive: true
          path: ./bin/net10.0/
          key: KEFCore_${{ github.run_number }}_${{ github.run_attempt }}_net10.0_bin_${{ github.sha }}

  # prepare matrix info
  prepare_matrix_data:
    needs: build_windows
    runs-on: ubuntu-latest
    outputs:
      matrix_jdk_vendor: ${{ steps.set-jdk-version.outputs.matrix_jdk_vendor || steps.set-jdk-version-ext.outputs.matrix_jdk_vendor }}
      matrix_win_os: ${{ steps.set-matrix-win-os.outputs.matrix_win || steps.set-matrix-win-os-ext.outputs.matrix_win }}
      matrix_linux_os: ${{ steps.set-matrix-linux-os.outputs.matrix_linux || steps.set-matrix-linux-os-ext.outputs.matrix_linux }}
      matrix_mac_os: ${{ steps.set-matrix-mac-os.outputs.matrix_mac || steps.set-matrix-mac-os-ext.outputs.matrix_mac }}
    steps:
      - id: set-jdk-version
        if: ${{ inputs.ExecuteOnLargerJDKSet == false }}
        run: echo "matrix_jdk_vendor=[ 'temurin' ]" >> $GITHUB_OUTPUT
      - id: set-jdk-version-ext
        if: ${{ inputs.ExecuteOnLargerJDKSet == true }}
        run: echo "matrix_jdk_vendor=[ 'temurin', 'zulu', 'microsoft', 'corretto', 'oracle' ]" >> $GITHUB_OUTPUT
      - id: set-matrix-win-os
        if: ${{ inputs.ExecuteOnMoreOSes == false }}
        run: echo "matrix_win=[ 'windows-2025' ]" >> $GITHUB_OUTPUT
      - id: set-matrix-win-os-ext
        if: ${{ inputs.ExecuteOnMoreOSes == true }}
        run: echo "matrix_win=[ 'windows-2022', 'windows-2025', 'windows-11-arm' ]" >> $GITHUB_OUTPUT
      - id: set-matrix-linux-os
        if: ${{ inputs.ExecuteOnMoreOSes == false }}
        run: echo "matrix_linux=['ubuntu-24.04']" >> $GITHUB_OUTPUT
      - id: set-matrix-linux-os-ext
        if: ${{ inputs.ExecuteOnMoreOSes == true }}
        run: echo "matrix_linux=[ 'ubuntu-22.04', 'ubuntu-22.04-arm', 'ubuntu-24.04', 'ubuntu-24.04-arm' ]" >> $GITHUB_OUTPUT
      - id: set-matrix-mac-os
        if: ${{ inputs.ExecuteOnMoreOSes == false }}
        run: echo "matrix_mac=[ 'macos-15' ]" >> $GITHUB_OUTPUT
      - id: set-matrix-mac-os-ext
        if: ${{ inputs.ExecuteOnMoreOSes == true }}
        run: echo "matrix_mac=[ 'macos-14', 'macos-15', 'macos-26' ]" >> $GITHUB_OUTPUT

  execute_tests_linux:
    if: ${{ inputs.EnableLinuxTests == true }}
    needs: prepare_matrix_data
    services:
      kafka:
        # Private registry image
        image: ghcr.io/masesgroup/knet:V3.2.1.0 # to be changed with official version when will be available
        credentials:
          username: ${{ secrets.actor }}
          password: ${{ secrets.GITHUB_TOKEN_INHERITED }}
        ports:
          - 9092:9092
        env:
          KNET_DOCKER_RUNNING_MODE: server-standalone
          JCOBRIDGE_LicensePath: ${{ secrets.JCOBRIDGE_ENCODED }}
          
    strategy:
      fail-fast: false
      matrix:
        serialization: [ 'Json', 'Protobuf', 'Avro' ]
        os: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_linux_os) }}
        framework: [ 'net8.0', 'net9.0', 'net10.0' ]
        jdk_vendor: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_jdk_vendor) }}
        jdk_version: [ '17', '21', '25' ] # only LTS versions
        
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_DbgEnableMiniDump: ${{ inputs.EnableProcessDump }}
      DOTNET_DbgMiniDumpType: ${{ inputs.ProcessDumpType }}
      DOTNET_DbgMiniDumpName: ${{ github.workspace }}/coredump.%p.dmp
      DOTNET_CreateDumpDiagnostics: ${{ inputs.EnableProcessDump }}
      DOTNET_CreateDumpVerboseDiagnostics: ${{ inputs.EnableVerboseDiagnosticProcessDump }}
      DOTNET_EnableCrashReport: ${{ inputs.EnableProcessDump }}
      DOTNET_CreateDumpLogToFile: ${{ github.workspace }}/coredump.diagnostic
      JCOBRIDGE_LicensePath: ${{ secrets.JCOBRIDGE_ENCODED }}
      
    steps:
      - name: Restore KEFCore ${{ matrix.framework }} bin from cache
        uses: actions/cache/restore@v5
        with:
          fail-on-cache-miss: true
          enableCrossOsArchive: true
          path: ./bin/${{ matrix.framework }}/
          key: KEFCore_${{ github.run_number }}_${{ github.run_attempt }}_${{ matrix.framework }}_bin_${{ github.sha }}
 
      - name: Set up JDK distribution
        uses: actions/setup-java@v5
        with: # running setup-java again overwrites the settings.xml
          distribution: ${{ matrix.jdk_vendor }}
          java-version: ${{ matrix.jdk_version }}
          check-latest: true

      - uses: actions/setup-dotnet@v5
        if: ${{ matrix.framework == 'net8.0' }}
        with:
          dotnet-version: |
            8.x

      - uses: actions/setup-dotnet@v5
        if: ${{ matrix.framework == 'net9.0' }}
        with:
          dotnet-version: |
            9.x

      - uses: actions/setup-dotnet@v5
        if: ${{ matrix.framework == 'net10.0' }}
        with:
          dotnet-version: |
            10.x

      - name: Execute Benchmark.KafkaStreams.Raw on Ubuntu with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        continue-on-error: ${{ inputs.ForceContinueOnError == true }}
        run: dotnet ${{ github.workspace }}/bin/${{ matrix.framework }}/MASES.EntityFrameworkCore.KNet.Test.Benchmark.dll ${{ github.workspace }}/bin/${{ matrix.framework }}/KafkaStreams.Raw.json /p:DatabaseName=TestDBBenchmark /p:Use${{ matrix.serialization }}=true /p:ForceDebugLog=${{ inputs.EnableDebugLogging }}

      - name: Execute Benchmark.KafkaStreams.Buffered on Ubuntu with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        continue-on-error: ${{ inputs.ForceContinueOnError == true }}
        run: dotnet ${{ github.workspace }}/bin/${{ matrix.framework }}/MASES.EntityFrameworkCore.KNet.Test.Benchmark.dll ${{ github.workspace }}/bin/${{ matrix.framework }}/KafkaStreams.Buffered.json /p:DatabaseName=TestDBBenchmark /p:Use${{ matrix.serialization }}=true /p:ForceDebugLog=${{ inputs.EnableDebugLogging }}

      - name: Execute Benchmark.KNetStreams.Raw on Ubuntu with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        continue-on-error: ${{ inputs.ForceContinueOnError == true }}
        run: dotnet ${{ github.workspace }}/bin/${{ matrix.framework }}/MASES.EntityFrameworkCore.KNet.Test.Benchmark.dll ${{ github.workspace }}/bin/${{ matrix.framework }}/KNetStreams.Raw.json /p:DatabaseName=TestDBBenchmark /p:Use${{ matrix.serialization }}=true /p:ForceDebugLog=${{ inputs.EnableDebugLogging }}

      - name: Execute Benchmark.KNetStreams.Raw.Prefetch on Ubuntu with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        continue-on-error: ${{ inputs.ForceContinueOnError == true }}
        run: dotnet ${{ github.workspace }}/bin/${{ matrix.framework }}/MASES.EntityFrameworkCore.KNet.Test.Benchmark.dll ${{ github.workspace }}/bin/${{ matrix.framework }}/KNetStreams.Raw.Prefetch.json /p:DatabaseName=TestDBBenchmark /p:Use${{ matrix.serialization }}=true /p:ForceDebugLog=${{ inputs.EnableDebugLogging }}

      - name: Execute Benchmark.KNetStreams.Buffered on Ubuntu with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        continue-on-error: ${{ inputs.ForceContinueOnError == true }}
        run: dotnet ${{ github.workspace }}/bin/${{ matrix.framework }}/MASES.EntityFrameworkCore.KNet.Test.Benchmark.dll ${{ github.workspace }}/bin/${{ matrix.framework }}/KNetStreams.Buffered.json /p:DatabaseName=TestDBBenchmark /p:Use${{ matrix.serialization }}=true /p:ForceDebugLog=${{ inputs.EnableDebugLogging }}

      - name: Execute Benchmark.KNetStreams.Buffered.Prefetch on Ubuntu with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        continue-on-error: ${{ inputs.ForceContinueOnError == true }}
        run: dotnet ${{ github.workspace }}/bin/${{ matrix.framework }}/MASES.EntityFrameworkCore.KNet.Test.Benchmark.dll ${{ github.workspace }}/bin/${{ matrix.framework }}/KNetStreams.Buffered.Prefetch.json /p:DatabaseName=TestDBBenchmark /p:Use${{ matrix.serialization }}=true /p:ForceDebugLog=${{ inputs.EnableDebugLogging }}

      - name: Execute Benchmark.KNetReplicator on Ubuntu with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        if: ${{ inputs.UseKNetCompactedReplicator == true }}
        continue-on-error: ${{ inputs.ForceContinueOnError == true }}
        run: dotnet ${{ github.workspace }}/bin/${{ matrix.framework }}/MASES.EntityFrameworkCore.KNet.Test.Benchmark.dll ${{ github.workspace }}/bin/${{ matrix.framework }}/KNetReplicator.json /p:DatabaseName=TestDBBenchmark /p:Use${{ matrix.serialization }}=true /p:ForceDebugLog=${{ inputs.EnableDebugLogging }}

      - name: Execute ComplexTest.KNetStreams.Raw on Ubuntu with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        continue-on-error: ${{ inputs.ForceContinueOnError == true }}
        run: dotnet ${{ github.workspace }}/bin/${{ matrix.framework }}/MASES.EntityFrameworkCore.KNet.Test.Complex.dll ${{ github.workspace }}/bin/${{ matrix.framework }}/KNetStreams.Raw.json /p:DatabaseName=TestDBComplex /p:Use${{ matrix.serialization }}=true /p:NumberOfElements=10000 /p:ForceDebugLog=${{ inputs.EnableDebugLogging }}

      - name: Execute only reload ComplexTest.KNetStreams.Raw on Ubuntu with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        continue-on-error: ${{ inputs.ForceContinueOnError == true }}
        run: dotnet ${{ github.workspace }}/bin/${{ matrix.framework }}/MASES.EntityFrameworkCore.KNet.Test.Complex.dll ${{ github.workspace }}/bin/${{ matrix.framework }}/KNetStreams.Raw.json /p:DatabaseName=TestDBComplex /p:Use${{ matrix.serialization }}=true /p:DeleteApplicationData=false /p:LoadApplicationData=false /p:ForceDebugLog=${{ inputs.EnableDebugLogging }}

      - uses: actions/upload-artifact@v7
        with:
          if-no-files-found: ignore
          name: coredumps_${{ matrix.serialization }}_${{ matrix.os }}_${{ matrix.framework }}_${{ matrix.jdk_vendor }}_${{ matrix.jdk_version }}
          path: ${{ github.workspace }}/coredump.*
          retention-days: 7

      - uses: actions/upload-artifact@v7
        with:
          if-no-files-found: ignore
          name: hs_err_${{ matrix.serialization }}_${{ matrix.os }}_${{ matrix.framework }}_${{ matrix.jdk_vendor }}_${{ matrix.jdk_version }}
          path: ${{ github.workspace }}/**/hs_err_*
          retention-days: 7
         
  execute_tests_windows:
    if: ${{ inputs.EnableWindowsTests == true }}
    needs: prepare_matrix_data
    strategy:
      fail-fast: false
      matrix:
        serialization: [ 'Json', 'Protobuf', 'Avro' ]
        os: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_win_os) }}
        framework: [ 'net8.0', 'net9.0', 'net10.0' ]
        jdk_vendor: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_jdk_vendor) }}
        jdk_version: [ '17', '21', '25' ] # only LTS versions
        
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_DbgEnableMiniDump: ${{ inputs.EnableProcessDump }}
      DOTNET_DbgMiniDumpType: ${{ inputs.ProcessDumpType }}
      DOTNET_DbgMiniDumpName: ${{ github.workspace }}/coredump.%p.dmp
      DOTNET_CreateDumpDiagnostics: ${{ inputs.EnableProcessDump }}
      DOTNET_CreateDumpVerboseDiagnostics: ${{ inputs.EnableVerboseDiagnosticProcessDump }}
      DOTNET_EnableCrashReport: ${{ inputs.EnableProcessDump }}
      DOTNET_CreateDumpLogToFile: ${{ github.workspace }}/coredump.diagnostic
      JCOBRIDGE_LicensePath: ${{ secrets.JCOBRIDGE_ENCODED }}
      
    steps:
      - name: Restore KEFCore ${{ matrix.framework }} bin from cache
        uses: actions/cache/restore@v5
        with:
          fail-on-cache-miss: true
          enableCrossOsArchive: true
          path: ./bin/${{ matrix.framework }}/
          key: KEFCore_${{ github.run_number }}_${{ github.run_attempt }}_${{ matrix.framework }}_bin_${{ github.sha }}
 
      - name: Set up JDK distribution
        uses: actions/setup-java@v5
        with: # running setup-java again overwrites the settings.xml
          distribution: ${{ matrix.jdk_vendor }}
          java-version: ${{ matrix.jdk_version }}
          check-latest: true

      - uses: actions/setup-dotnet@v5
        if: ${{ matrix.framework == 'net10.0' }}
        with:
          dotnet-version: |
            10.x

      - name: Disable CET for dotnet process
        run: |
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\knet.exe" /v MitigationOptions /t REG_BINARY /d "0000000000000000000000000000002000" /f
          Get-ProcessMitigation -Name "knet.exe"

      - name: Download Procdump and prepare # see https://gist.github.com/Sedeniono/e6d6504e3bf0645937852ee5681ef9ee and https://learn.microsoft.com/it-it/sysinternals/downloads/procdump
        if: ${{ inputs.EnableProcessDump == 1 }}
        continue-on-error: true
        run: |
          C:\msys64\usr\bin\wget.exe https://download.sysinternals.com/files/Procdump.zip
          Expand-Archive -LiteralPath '${{ github.workspace }}\Procdump.zip' -DestinationPath ${{ github.workspace }}\Procdump -Force
          dir .\Procdump
          ${{ github.workspace }}\Procdump\procdump.exe -accepteula
          mkdir CrashDumpsDir
          ${{ github.workspace }}\Procdump\procdump.exe -ma -i ${{ github.workspace }}\CrashDumpsDir

      - name: Restore MASES.KNetCLI in cache
        if: ${{ inputs.UseLastRepositoryBuildKNet == true }}
        uses: actions/cache/restore@v5
        with:
          fail-on-cache-miss: true
          enableCrossOsArchive: true
          path: ./KNetNuGet/MASES.KNetCLI*
          key: KEFCore_${{ github.run_number }}_${{ github.run_attempt }}_MASES.KNetCLI_${{ github.sha }}

      - name: Use latest local version of KNetCLI
        if: ${{ success() && inputs.UseLastRepositoryBuildKNet == true }}
        run: dotnet tool update -g MASES.KNetCLI --source "${{ github.workspace }}\KNetNuGet\"

      - name: Authenticate to GitHub
        if: ${{ inputs.UseLastRepositoryBuildKNet != true }}
        run: dotnet nuget add source --username ${{ secrets.actor }} --password ${{ secrets.GITHUB_TOKEN_INHERITED }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/masesgroup/index.json"
        
      - name: Download latest published version of KNetCLI
        if: ${{ inputs.UseLastRepositoryBuildKNet != true }}
        run: dotnet tool update -g MASES.KNetCLI --version 3.2.1

      - name: Prepare log files folder
        shell: pwsh
        run: New-Item -Path "${{ github.workspace }}" -Name "logfiles" -ItemType Directory

      - name: Start Kafka and execute Benchmark.KafkaStreams.Raw on ${{ matrix.os }} with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        continue-on-error: ${{ inputs.ForceContinueOnError == true }}
        shell: pwsh
        run: |
          knet storagetool format --standalone --ignore-formatted -t 6oTi4odMSVSmroqyy5rubw -c ${{ github.workspace }}/bin/${{ matrix.framework }}/windows_server.properties
          Start-Process -RSE ${{ github.workspace }}\logfiles\PWSH_kafka_err.log -RSO ${{ github.workspace }}\logfiles\PWSH_kafka_out.log -FilePath knet -ArgumentList ( 'kafkastart',  '-LogPath', '${{ github.workspace }}\logfiles\', '-Log4JConfiguration', '${{ github.workspace }}\bin\${{ matrix.framework }}\log4j2.yaml', '${{ github.workspace }}\bin\${{ matrix.framework }}\windows_server.properties' )
          dotnet ${{ github.workspace }}\bin\${{ matrix.framework }}\MASES.EntityFrameworkCore.KNet.Test.Benchmark.dll ${{ github.workspace }}\bin\${{ matrix.framework }}\KafkaStreams.Raw.json /p:DatabaseName=TestDBBenchmark /p:Use${{ matrix.serialization }}=true /p:ForceDebugLog=${{ inputs.EnableDebugLogging }}

      - name: Forcibly stop knet on ${{ matrix.os }} with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        continue-on-error: true
        shell: cmd
        run: wmic process where (commandline like "%%knet%%" and not name="wmic.exe") delete

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.UploadServerLogs == true }}
        with:
          if-no-files-found: ignore
          name: Benchmark.KafkaStreams.Raw_Server_${{ matrix.serialization }}_${{ matrix.os }}_${{ matrix.framework }}_${{ matrix.jdk_vendor }}_${{ matrix.jdk_version }}
          path: ${{ github.workspace }}/logfiles/
          retention-days: 7

      - name: Cleanup Kafka for ${{ matrix.os }} with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        continue-on-error: ${{ inputs.ForceContinueOnError == true }}
        run: |
          Remove-Item -Path "${{ github.workspace }}\logfiles\*" -Recurse -Force
          Remove-Item -Path "${{ github.workspace }}\kraft-combined-logs\*" -Recurse -Force

      - name: Start Kafka and execute Benchmark.KafkaStreams.Buffered on ${{ matrix.os }} with ${{ matrix.jdk_vendor }} ${{ matrix.jdk_version }} based on ${{ matrix.serialization }}
        continue-on-error: ${{ inputs.ForceContinueOnError == true }}
        shell: pwsh
        run: |
          knet storagetool format --standalone --ignore-formatted -t 6oTi4odMSVSmroqyy5rubw -c ${{ github.workspace }}/bin/${{ matrix.framework }}/windows_server.properties
